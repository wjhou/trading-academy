<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Academy - Choose Language</title>
    <style>
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --container-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --card-gradient-start: #667eea;
            --card-gradient-end: #764ba2;
            --card-text: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-color-light: rgba(0, 0, 0, 0.2);
        }

        .dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: #0f3460;
            --text-primary: #e8e8e8;
            --text-secondary: #b8b8b8;
            --card-gradient-start: #e94560;
            --card-gradient-end: #533483;
            --card-text: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --shadow-color-light: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            transition: background 0.3s ease;
        }
        .container {
            text-align: center;
            background: var(--container-bg);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-color);
            position: relative;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid var(--text-secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            border-color: var(--text-primary);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        .subtitle {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 50px;
            transition: color 0.3s ease;
        }
        .language-options {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .language-card {
            display: block;
            padding: 40px 60px;
            background: linear-gradient(135deg, var(--card-gradient-start) 0%, var(--card-gradient-end) 100%);
            color: var(--card-text);
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.5em;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px var(--shadow-color-light);
        }
        .language-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-color);
        }
        .flag {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <span id="theme-icon">🌙</span>
        </button>
        <h1>Trading Academy</h1>
        <p class="subtitle">From Beginner to Professional | 从初学者到专业人士</p>
        <div class="language-options">
            <a href="./en/index.html" class="language-card">
                <span class="flag">🇬🇧</span>
                English
            </a>
            <a href="./zh/index.html" class="language-card">
                <span class="flag">🇨🇳</span>
                中文
            </a>
        </div>
    </div>
    <script>
        // Theme management
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        // Load saved theme or default to light
        const savedTheme = localStorage.getItem('landing-theme') || 'light';
        if (savedTheme === 'dark') {
            html.classList.add('dark');
            themeIcon.textContent = '☀️';
        }

        // Toggle theme
        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('landing-theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
