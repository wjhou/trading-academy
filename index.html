<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Academy - Choose Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #333;
        }
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 50px;
        }
        .language-options {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        .language-card {
            display: block;
            padding: 40px 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.5em;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .language-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .flag {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trading Academy</h1>
        <p class="subtitle">From Beginner to Professional | 从初学者到专业人士</p>
        <div class="language-options">
            <a href="./en/index.html" class="language-card">
                <span class="flag">🇬🇧</span>
                English
            </a>
            <a href="./zh/index.html" class="language-card">
                <span class="flag">🇨🇳</span>
                中文
            </a>
        </div>
    </div>
</body>
</html>
